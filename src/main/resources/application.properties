spring.application.name=EventHub

spring.datasource.url=jdbc:postgresql://localhost:5432/eventhub_db
# TODO change username and password for env variables
spring.datasource.username=exampleuser
spring.datasource.password=examplepassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect